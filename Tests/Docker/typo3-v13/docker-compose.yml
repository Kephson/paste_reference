version: '3.8'

services:
  web:
    build:
      context: ../../../
      dockerfile: Tests/Docker/typo3-v13/Dockerfile
    ports:
      - "8013:80"
    volumes:
      - ../../../:/var/www/html/extensions/paste_reference:ro
      - typo3_v13_data:/var/www/html/var
      - typo3_v13_fileadmin:/var/www/html/public/fileadmin
    environment:
      - TYPO3_VERSION=13.4
      - PHP_VERSION=8.2
      - TYPO3_CONTEXT=Development/Testing
      - TYPO3_TEST_DB_HOST=db
      - TYPO3_TEST_DB_NAME=typo3_test
      - TYPO3_TEST_DB_USER=typo3
      - TYPO3_TEST_DB_PASSWORD=typo3
    depends_on:
      - db
    networks:
      - typo3_v13_network

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=typo3_test
      - MYSQL_USER=typo3
      - MYSQL_PASSWORD=typo3
    volumes:
      - typo3_v13_db:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "3313:3306"
    networks:
      - typo3_v13_network

volumes:
  typo3_v13_data:
  typo3_v13_fileadmin:
  typo3_v13_db:

networks:
  typo3_v13_network:
    driver: bridge